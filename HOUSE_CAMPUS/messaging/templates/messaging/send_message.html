{% extends "base.html" %}

{% block title %}Contact Landlord{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Contact the Landlord</h3>
            <p class="mb-0">{{ property.title }}</p>
        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-success">
                    Send Message
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
