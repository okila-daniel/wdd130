{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2>Delete Property</h2>

    <p>
        Are you sure you want to delete
        <strong>{{ property.title }}</strong>?
    </p>

    <form method="POST">
        {% csrf_token %}

        <button type="submit" class="btn btn-danger">
            Delete
        </button>

        <a href="{% url 'property_list' %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>

</div>

{% endblock %}
