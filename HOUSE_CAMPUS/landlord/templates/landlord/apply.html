{% extends "base.html" %}

{% block title %}Become a Landlord{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-header bg-primary text-white">
            <h3>Become a Verified Landlord</h3>
        </div>

        <div class="card-body">

            <form method="POST" enctype="multipart/form-data">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-success">
                    Submit Application
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
